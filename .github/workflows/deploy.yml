name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select deployment environment'
        required: true
        type: choice
        options:
          - development
          - production

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/development' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          VITE_DEFAULT_CITY: ${{ vars.VITE_DEFAULT_CITY }}
          VITE_JWT_TOKEN: ${{ secrets.VITE_JWT_TOKEN }}
          VITE_DEPLOYMENT_ENV: development

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: complai-frontend-dev
          commit_message: 'Deploy development build to GitHub Pages'

      - name: Configure GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X POST \
            -f source[branch]=gh-pages \
            -f source[path]=/
        continue-on-error: true

  deploy-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          VITE_DEFAULT_CITY: ${{ vars.VITE_DEFAULT_CITY }}
          VITE_JWT_TOKEN: ${{ secrets.VITE_JWT_TOKEN }}
          VITE_DEPLOYMENT_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'Deploy production build to GitHub Pages'

      - name: Configure GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X POST \
            -f source[branch]=gh-pages \
            -f source[path]=/
        continue-on-error: true
