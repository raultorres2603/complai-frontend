name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
        type: string

jobs:
  deploy-dev:
    if: github.event.inputs.environment == 'development'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          VITE_CITY_ID: ${{ vars.VITE_CITY_ID }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'ComplAI' }}
          VITE_DEPLOYMENT_ENV: development

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          commit_message: 'Deploy development build to GitHub Pages'

  deploy-prod:
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run type-check

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          VITE_CITY_ID: ${{ vars.VITE_CITY_ID }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'ComplAI' }}
          VITE_DEPLOYMENT_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'Deploy production build to GitHub Pages'
